name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../skillshub-${{ matrix.target }}.tar.gz skillshub
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillshub-${{ matrix.target }}
          path: skillshub-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract changelog section
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Try to extract the section for this version from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Extract text between this version header and the next version header
            BODY=$(sed -n "/^## .*${VERSION}/,/^## /{/^## .*${VERSION}/d;/^## /d;p;}" CHANGELOG.md)
          fi
          if [ -z "$BODY" ]; then
            BODY="Release ${TAG}"
          fi
          # Write to file to preserve newlines
          echo "$BODY" > release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_body.md
          files: artifacts/*.tar.gz
          draft: false
          prerelease: false
